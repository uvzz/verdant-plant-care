name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  worker:
    name: Worker typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/verdant-ai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workers/verdant-ai/package-lock.json

      - name: Install worker deps
        run: npm ci

      - name: Verify worker entry
        run: test -f src/index.ts && node -e "console.log('worker ok')"
